# Reverse proxy: HTTP port 80 -> ansible-server on 127.0.0.1:14300
# Install: copy to /etc/nginx/conf.d/ansible-ui.conf (RHEL/Fedora/Arch)
#   or /etc/nginx/sites-available/ansible-ui + symlink sites-enabled (Debian)
#
# nginx -t && systemctl reload nginx

upstream ansible_ui_backend {
    server 127.0.0.1:14300;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 4m;

    # Long playbook runs (adjust if you use larger ANSIBLE_UI_PLAYBOOK_TIMEOUT_SECS)
    proxy_connect_timeout 75s;
    proxy_send_timeout 86400s;
    proxy_read_timeout 86400s;
    send_timeout 86400s;

    location / {
        proxy_pass http://ansible_ui_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
