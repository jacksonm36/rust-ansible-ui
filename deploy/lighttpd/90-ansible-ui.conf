# Reverse proxy: HTTP :80 -> 127.0.0.1:14300
# mod_proxy must be enabled first (install script runs: lighttpd-enable-mod proxy).
#
#   sudo cp 90-ansible-ui.conf /etc/lighttpd/conf-available/
#   sudo ln -sf ../conf-available/90-ansible-ui.conf /etc/lighttpd/conf-enabled/99-ansible-ui.conf
#   sudo lighttpd -t -f /etc/lighttpd/lighttpd.conf && sudo systemctl reload lighttpd

$SERVER["socket"] == ":80" {
    proxy.server = ( "" => (
        ( "host" => "127.0.0.1", "port" => 14300 )
    ) )
}
